version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10

    groups:
      # Free-to-update deps - Dependabot fully manages these
      forms:
        patterns:
          - "react-hook-form"
          - "@hookform/resolvers"
          - "zod"

      tanstack:
        patterns:
          - "@tanstack/*"

      linting:
        patterns:
          - "prettier"
          - "eslint-config-prettier"
          - "eslint-plugin-prettier"

      commitlint:
        patterns:
          - "@commitlint/*"
          - "husky"
          - "lint-staged"

    ignore:
      # expo itself is watched, signal to run `npx expo doctor` + `npx expo install --fix`
      - dependency-name: "expo"
        versions: ["*"]

      # Expo SDK packages - managed by `npx expo install --fix`
      - dependency-name: "expo-*"
        versions: ["*"]

      # ESLint - must be upgraded alongside eslint-config-expo via `npx expo install eslint eslint-config-expo`
      - dependency-name: "eslint"
        versions: ["*"]
      - dependency-name: "eslint-config-expo"
        versions: ["*"]

      # Babel - managed by Expo
      - dependency-name: "babel-preset-expo"
        versions: ["*"]

      # Jest - version pinned by jest-expo, managed via `npx expo install jest jest-expo`
      - dependency-name: "jest"
        versions: ["*"]
      - dependency-name: "jest-expo"
        versions: ["*"]
      - dependency-name: "@types/jest"
        versions: ["*"]

      # TypeScript - managed via `npx expo install typescript @types/react`
      - dependency-name: "typescript"
        versions: ["*"]
      - dependency-name: "@types/react"
        versions: ["*"]

      # React core - managed by Expo
      - dependency-name: "react"
        versions: ["*"]
      - dependency-name: "react-dom"
        versions: ["*"]
      - dependency-name: "react-test-renderer"
        versions: ["*"]

      # React Native core - managed by Expo
      - dependency-name: "react-native"
        versions: ["*"]
      - dependency-name: "react-native-gesture-handler"
        versions: ["*"]
      - dependency-name: "react-native-keyboard-controller"
        versions: ["*"]
      - dependency-name: "react-native-maps"
        versions: ["*"]
      - dependency-name: "react-native-pager-view"
        versions: ["*"]
      - dependency-name: "react-native-reanimated"
        versions: ["*"]
      - dependency-name: "react-native-safe-area-context"
        versions: ["*"]
      - dependency-name: "react-native-screens"
        versions: ["*"]
      - dependency-name: "react-native-svg"
        versions: ["*"]
      - dependency-name: "react-native-view-shot"
        versions: ["*"]
      - dependency-name: "react-native-web"
        versions: ["*"]
      - dependency-name: "react-native-webview"
        versions: ["*"]
      - dependency-name: "react-native-worklets"
        versions: ["*"]

      # Expo-pinned third-party packages
      - dependency-name: "@react-native-async-storage/async-storage"
        versions: ["*"]
      - dependency-name: "@react-native-community/datetimepicker"
        versions: ["*"]
      - dependency-name: "@react-native-community/netinfo"
        versions: ["*"]
      - dependency-name: "@react-native-community/slider"
        versions: ["*"]
      - dependency-name: "@react-native-masked-view/masked-view"
        versions: ["*"]
      - dependency-name: "@react-native-picker/picker"
        versions: ["*"]
      - dependency-name: "@react-native-segmented-control/segmented-control"
        versions: ["*"]
      - dependency-name: "@shopify/flash-list"
        versions: ["*"]
      - dependency-name: "@shopify/react-native-skia"
        versions: ["*"]
      - dependency-name: "@stripe/stripe-react-native"
        versions: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    groups:
      github-actions:
        patterns: ["*"]
