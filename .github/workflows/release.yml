name: Release Please

on:
  push:
    branches: ["main", "test"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SEMANTIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          # Each branch uses its own config + manifest so the two never share
          # a divergent file: main cuts stable releases, test cuts -test
          # prereleases. Both files exist on both branches; release-please only
          # writes the manifest for the branch it targets, so main <-> test
          # merges touch disjoint files and never conflict (no merge driver).
          config-file: ${{ github.ref_name == 'test' && 'release-please-config.test.json' || 'release-please-config.json' }}
          manifest-file: ${{ github.ref_name == 'test' && '.release-please-manifest.test.json' || '.release-please-manifest.json' }}
