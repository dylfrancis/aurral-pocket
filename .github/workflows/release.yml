name: Release Please

on:
  push:
    branches: ["main", "test"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SEMANTIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Reads release-please-config.json + .release-please-manifest.json
          # from the tip of this same branch, so `test` (prerelease config)
          # and `main` (stable config) each drive their own versioning.
          target-branch: ${{ github.ref_name }}
