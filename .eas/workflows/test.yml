name: Test Release

# Fires on release-please prerelease tags from the `test` branch
# (e.g. v1.3.0-test.1). Builds a store binary and ships it to TestFlight
# (iOS) and the Play internal track (Android), same as production — promote
# to closed/open/production tracks manually from there.
on:
  push:
    tags:
      - "v*-test*"

jobs:
  build_ios:
    name: Build iOS (test)
    type: build
    params:
      platform: ios
      profile: test
      message: ${{ github.ref_name }}

  submit_ios:
    name: Submit to TestFlight
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: ios-testflight

  build_android:
    name: Build Android (test)
    type: build
    params:
      platform: android
      profile: test
      message: ${{ github.ref_name }}

  submit_android:
    name: Submit to Play Internal
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: android-internal
