name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production
      message: ${{ github.ref_name }}

  testflight_ios:
    name: Distribute to TestFlight (internal + external)
    needs: [build_ios]
    type: testflight
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: ios-testflight
      external_groups: ["Aurral Beta Users"]
      submit_beta_review: true
      changelog: ${{ github.ref_name }}

  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production
      message: ${{ github.ref_name }}

  submit_android_internal:
    name: Submit to Play Internal
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: android-internal

  submit_android_closed:
    name: Submit to Play Closed (alpha)
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: android-closed
