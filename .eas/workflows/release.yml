name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production
      message: ${{ github.ref_name }}

  submit_ios:
    name: Submit to TestFlight
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production
      message: ${{ github.ref_name }}

  submit_android:
    name: Submit to Play Internal
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production
